<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drawing Game</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #f4f4f4;
  }

  canvas {
    border: 2px solid black;
    background: white;
    cursor: crosshair;
  }

  #score {
    font-size: 20px;
    margin: 10px;
  }

  button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="score">Score: 0</div>
<canvas id="canvas" width="500" height="400"></canvas><br>
<button onclick="clearCanvas()">Clear</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let lines = [];
let currentLine = [];
let lastPoint = null;
let collisionDetected = false;

let score = 0;
let usedPoints = new Set();

// 🎨 Unique colors
let hue = 0;
function getUniqueColor() {
  const color = `hsl(${hue}, 100%, 50%)`;
  hue = (hue + 37) % 360;
  return color;
}

// 🔴 Start points
const startPoints = [
  { x: 100, y: 100 },
  { x: 400, y: 100 },
  { x: 100, y: 300 },
  { x: 400, y: 300 }
];

function drawStartPoints() {
  for (let p of startPoints) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = "red";
    ctx.fill();
  }
}

// 🧠 Detect valid start/end
function getStartPoint(x, y) {
  const threshold = 10;

  for (let p of startPoints) {
    const dx = p.x - x;
    const dy = p.y - y;
    if (Math.sqrt(dx * dx + dy * dy) < threshold) {
      return p;
    }
  }
  return null;
}

// 🎯 Score
function updateScore(points) {
  score += points;
  document.getElementById("score").innerText = "Score: " + score;
}

// 🖱️ Start drawing
canvas.addEventListener("mousedown", (e) => {
  const x = e.offsetX;
  const y = e.offsetY;

  const startPoint = getStartPoint(x, y);
  if (!startPoint) return;

  drawing = true;
  collisionDetected = false;

  ctx.beginPath();
  ctx.moveTo(startPoint.x, startPoint.y);

  currentLine = [];
  lastPoint = { x: startPoint.x, y: startPoint.y };

  ctx.strokeStyle = getUniqueColor();
});

// ✏️ Drawing
canvas.addEventListener("mousemove", (e) => {
  if (!drawing) return;

  const x = e.offsetX;
  const y = e.offsetY;
  const newPoint = { x, y };

  const segment = { p1: lastPoint, p2: newPoint };
  currentLine.push(segment);

  checkCollision(segment);

  ctx.lineWidth = 3;
  ctx.lineCap = "round";

  ctx.lineTo(x, y);
  ctx.stroke();

  lastPoint = newPoint;
});

// 🧼 End drawing
canvas.addEventListener("mouseup", (e) => {
  if (!drawing) return;

  drawing = false;
  ctx.beginPath();

  const x = e.offsetX;
  const y = e.offsetY;
  const endPoint = getStartPoint(x, y);

  if (currentLine.length > 0) {
    lines.push({
      segments: currentLine,
      color: ctx.strokeStyle
    });

    // 🎯 Scoring
    if (endPoint) {
      const key = `${endPoint.x},${endPoint.y}`;
      if (!usedPoints.has(key)) {
        usedPoints.add(key);
        updateScore(10);
      }
    }
  }
});

// 💥 Collision detection
function checkCollision(newSeg) {
  if (collisionDetected) return;

  for (let line of lines) {
    for (let seg of line.segments) {
      if (segmentsIntersect(newSeg, seg)) {
        collisionDetected = true;
        alert("⚡ Lines touched!");
        return;
      }
    }
  }
}

// 📐 Line intersection math
function segmentsIntersect(s1, s2) {
  const A = s1.p1, B = s1.p2;
  const C = s2.p1, D = s2.p2;

  function ccw(P, Q, R) {
    return (R.y - P.y) * (Q.x - P.x) > (Q.y - P.y) * (R.x - P.x);
  }

  return (
    ccw(A, C, D) !== ccw(B, C, D) &&
    ccw(A, B, C) !== ccw(A, B, D)
  );
}

// 🔁 Redraw
function redrawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let line of lines) {
    ctx.beginPath();
    ctx.strokeStyle = line.color;

    for (let seg of line.segments) {
      ctx.moveTo(seg.p1.x, seg.p1.y);
      ctx.lineTo(seg.p2.x, seg.p2.y);
    }

    ctx.stroke();
  }

  drawStartPoints();
}

// 🧼 Clear
function clearCanvas() {
  lines = [];
  usedPoints.clear();
  score = 0;
  updateScore(0);
  redrawCanvas();
}

// 🟢 Init
drawStartPoints();
</script>

</body>
</html>
