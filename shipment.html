<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Drawing Game</title>

    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      #container {
  position: relative; /* IMPORTANT */
  height: 100%;
}
      #gameLayout {
  display: flex;
  height: calc(100% - 8%);
}

/* Sidebar */
#sidebar {
  width: 220px;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  gap: 20px;

  border-right: 3px solid #1e293b;
}

.stat {
  font-size: 20px;
  background: #1e293b;
  padding: 12px 20px;
  border-radius: 10px;
  width: 100%;
  text-align: center;

  box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
}

/* Canvas Area */
#canvasArea {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #cbd5f5, #94a3b8);
}

/* Canvas styling upgrade */
canvas {
  border: 4px solid #1e293b;
  border-radius: 12px;
  background: white;

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Header improvements */
#header {
  height: 8%;
  background: #020617;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  color: #cbd5f5;
}

#header .left {
  display: flex;
  align-items: center;
  gap: 10px;
}

#header img {
  width: 40px;
  cursor: pointer;
}

/* Button upgrade */
button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}
#levelOverlay {
  position: absolute;
  inset: 0; /* shorthand for top:0, left:0, right:0, bottom:0 */

  background: rgba(0, 0, 0, 0.75);

  display: flex;
  align-items: center;
  justify-content: center;

  opacity: 0;
  pointer-events: none;

  z-index: 1000; /* ensure it sits above everything */
}
#levelMessage {
  padding: 40px 70px;
  font-size: 42px;
  font-weight: bold;
  border-radius: 15px;

  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;

  box-shadow:
    0 0 20px rgba(0, 0, 0, 0.7),
    0 0 40px rgba(0, 255, 255, 0.5);

  transform: scale(0.7);
  opacity: 0;
}

.showOverlay {
  animation: fadeIn 0.3s forwards;
}

.showOverlay #levelMessage {
  animation: popIn 0.4s forwards;
}

@keyframes popIn {
  to {
    transform: scale(1);
    opacity: 1;
  }
}
    </style>
  </head>

  <body>
    <div id="container">
        <div id="header">
          <div class="left">
            <img
              src="https://cdn.pixabay.com/photo/2014/04/03/00/38/house-308936_1280.png"
              onclick="goHome()"
            />
            <h2>Amazook</h2>
          </div>
      
          <div class="right">
            <span>Game: Shipment</span>
          </div>
        </div>
      
        <div id="gameLayout">
          <!-- Sidebar -->
          <div id="sidebar">
            <div class="stat" id="level">Level: 1</div>
            <div class="stat" id="score">Score: 0</div>
            <div class="stat" id="timer">Time: 60</div>
            <button onclick="startGame()">Start</button>
            <button onclick="pauseGame()">Pause</button>
      
            <button onclick="clearCanvas()">Restart</button>
          </div>
      
          <!-- Canvas Area -->
          <div id="canvasArea">
            <canvas id="canvas" width="700" height="600"></canvas>
          </div>
        </div>
      
        <div id="levelOverlay">
          <div id="levelMessage">Level Complete!</div>
        </div>
      </div>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let drawing = false;
      let lines = [];
      let currentLine = [];
      let lastPoint = null;
      let collisionDetected = false;
      let gameRunning = false;
      let score = 0;
      let usedPoints = new Set();

      let startPoints = [];
      let activeColor = "black";
      let startPointRef = null;

      let pairCount = 3;
      let level = 1;

      // Color generator
      let hue = 0;
      function getUniqueColor() {
        const color = `hsl(${hue}, 100%, 50%)`;
        hue = (hue + 60) % 360;
        return color;
      }

      function goHome() {
        window.location.href = "index.html"; // Go home (reload current page)
      }
      // Generate paired points
      function generateStartPoints(pairCount) {
        const points = [];
        const minDist = 50;

        function isValid(p) {
          for (let other of points) {
            const dx = p.x - other.x;
            const dy = p.y - other.y;
            if (Math.sqrt(dx * dx + dy * dy) < minDist) return false;
          }
          return true;
        }

        for (let i = 0; i < pairCount; i++) {
          const color = getUniqueColor();
          let p1, p2;

          do {
            p1 = {
              x: Math.random() * (canvas.width - 40) + 20,
              y: Math.random() * (canvas.height - 40) + 20,
              color,
            };
          } while (!isValid(p1));
          points.push(p1);

          do {
            p2 = {
              x: Math.random() * (canvas.width - 40) + 20,
              y: Math.random() * (canvas.height - 40) + 20,
              color,
            };
          } while (!isValid(p2));
          points.push(p2);
        }
        return points;
      }

      // Draw points
      function drawStartPoints() {
        for (let p of startPoints) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        }
      }

      // Detect point
      function getStartPoint(x, y) {
        const threshold = 10;
        for (let p of startPoints) {
          const dx = p.x - x;
          const dy = p.y - y;
          if (Math.sqrt(dx * dx + dy * dy) < threshold) return p;
        }
        return null;
      }

      // Score
      function updateScore(points) {
        score += points;
        document.getElementById("score").innerText = "Score: " + score;
      }

      // Check win
      function checkWin() {
        if (usedPoints.size === startPoints.length) {
          setTimeout(() => {
            showLevelComplete();
          }, 100);
        }
      }

      // Timer
      let timeLeft = 60;
      let timerInterval;

      function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 60;
        updateTimerDisplay();

        timerInterval = setInterval(() => {
            if (!gameRunning) return;

            timeLeft--;
            updateTimerDisplay();

            if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("⏰ Time's up!");
            }
        }, 1000);
        }

        function updateTimerDisplay() {
        document.getElementById("timer").innerText = "Time: " + timeLeft;
        }

        function startGame() {
        if (gameRunning) return;

        gameRunning = true;

        // only start timer if it's not already running
        if (!timerInterval) {
            startTimer();
        }
        }

        function pauseGame() {
        gameRunning = false;
        }

      // Start drawing
      canvas.addEventListener("mousedown", (e) => {
        if (!gameRunning || timeLeft <= 0) return;

        const startPoint = getStartPoint(e.offsetX, e.offsetY);
        if (!startPoint) return;

        startPointRef = startPoint;
        drawing = true;
        collisionDetected = false;

        ctx.beginPath();
        ctx.moveTo(startPoint.x, startPoint.y);

        currentLine = [];
        lastPoint = { x: startPoint.x, y: startPoint.y };

        activeColor = startPoint.color;
        ctx.strokeStyle = activeColor;
      });

      // Drawing
      canvas.addEventListener("mousemove", (e) => {
        if (!drawing || !gameRunning || timeLeft <= 0) return;

        const newPoint = { x: e.offsetX, y: e.offsetY };
        const segment = { p1: lastPoint, p2: newPoint };

        currentLine.push(segment);
        checkCollision(segment);

        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        ctx.lineTo(newPoint.x, newPoint.y);
        ctx.stroke();

        lastPoint = newPoint;
      });

      // End drawing (FIXED to mark both points used)
      canvas.addEventListener("mouseup", (e) => {
        if (!drawing) return;

        drawing = false;
        ctx.beginPath();

        const endPoint = getStartPoint(e.offsetX, e.offsetY);

        if (
          !endPoint ||
          endPoint === startPointRef ||
          endPoint.color !== startPointRef.color
        ) {
          redrawCanvas();
          startPointRef = null;
          return;
        }

        lines.push({
          segments: currentLine,
          color: activeColor,
        });

        // mark BOTH start and end points as used
        usedPoints.add(`${startPointRef.x},${startPointRef.y}`);
        usedPoints.add(`${endPoint.x},${endPoint.y}`);

        updateScore(10);

        startPointRef = null;

        checkWin(); // now triggers correctly
      });

      // Collision
      function checkCollision(newSeg) {
        if (collisionDetected) return;
        for (let line of lines) {
          for (let seg of line.segments) {
            if (segmentsIntersect(newSeg, seg)) {
              collisionDetected = true;
              alert("⚡ Lines touched!");
              return;
            }
          }
        }
      }

      // Math
      function segmentsIntersect(s1, s2) {
        const A = s1.p1,
          B = s1.p2;
        const C = s2.p1,
          D = s2.p2;
        function ccw(P, Q, R) {
          return (R.y - P.y) * (Q.x - P.x) > (Q.y - P.y) * (R.x - P.x);
        }
        return ccw(A, C, D) !== ccw(B, C, D) && ccw(A, B, C) !== ccw(A, B, D);
      }

      // Redraw
      function redrawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let line of lines) {
          ctx.beginPath();
          ctx.strokeStyle = line.color;
          for (let seg of line.segments) {
            ctx.moveTo(seg.p1.x, seg.p1.y);
            ctx.lineTo(seg.p2.x, seg.p2.y);
          }
          ctx.stroke();
        }
        drawStartPoints();
      }

      // Animation
      function showLevelComplete(){
        const overlay = document.getElementById("levelOverlay");

        overlay.classList.add("showOverlay");
        overlay.style.pointerEvents = "auto";

        setTimeout(() => {
          overlay.classList.remove("showOverlay");
          overlay.style.pointerEvents = "none";
          nextLevel();
        }, 1500);
      }

      // Next level
      function nextLevel() {
        pairCount++;
        level++;
        document.getElementById("level").innerText = "Level: " + level;

        lines = [];
        usedPoints.clear();
        hue = 0;

        startPoints = generateStartPoints(pairCount);
        redrawCanvas();
        startTimer();
      }

      // Restart
      function clearCanvas() {
        pairCount = 3;
        level = 1;
        document.getElementById("level").innerText = "Level: 1";

        lines = [];
        usedPoints.clear();
        score = 0;
        updateScore(0);

        hue = 0;
        startPoints = generateStartPoints(pairCount);
        redrawCanvas();

        gameRunning = false;
        clearInterval(timerInterval);
        timerInterval = null;

        timeLeft = 60;
        document.getElementById("timer").innerText = "Time: 60";
        }

      // Init
      startPoints = generateStartPoints(pairCount);
      drawStartPoints();
    //   startTimer();
    </script>
  </body>
</html>
