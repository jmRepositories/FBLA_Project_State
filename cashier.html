<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cashier</title>
    <!-- <link rel="stylesheet" href="styles.css" /> -->
     <style>
        /* NAVBAR (Cashier Theme) */
        body {
  margin: 0;
  background-color: rgb(224, 224, 224);
}

#imgBox {
  margin-top: 20px;
}
#header {
  height: 70px;
  background-color: #020617;  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  color: #ecfdf5;

  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

#header .left {
  display: flex;
  align-items: center;
  gap: 10px;
}

#header img {
  width: 40px;
  cursor: pointer;
  filter: brightness(0) invert(1); /* makes icon white */
}

#header h2 {
  margin: 0;
}

#header .right {
  font-size: 18px;
  background: rgba(0,0,0,0.2);
  padding: 8px 14px;
  border-radius: 8px;
}
        #receipt {
    position: absolute;
    top: 75px;
    right: 10%;
    height: 400px;
    width: 400px;
    background-color: rgb(246, 246, 246);
    display: flex;
    justify-content: center;
  }

  body{
    background-color: rgb(224, 224, 224);
  }

  .notification {
    margin-bottom: 10px;
  }

  #imgBox {
    height: 650px;
    /* padding-left: 100px ; */
    margin: 30px;
    border: 5px solid black;
  }

  #receipt-list {
    list-style: none;
    padding: 0;
  }

  #receipt-list li {
    display: flex;
    justify-content: space-between;
  }

  .notification input {
    margin-top: 6px;
  }

  .notification button {
    margin-top: 10px;
  }

  .notification h3,
  .notification p,
  .notification ul {
    margin: 6px 0;
  }

  .scan-area {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .scan-item {
    width: 200px;
    position: absolute;
    left: 30%;
    top: 20%;
  }

  #nav{
    top: 0;
    margin: 0;
    padding: 0;

  }

  .scanner {
    width: 120px;
    position: absolute;
    bottom: 20px;
    left: 20px;
    cursor: grab;
  }

  .thick-line {
    border: none;
    height: 2px; /* thickness */
    background-color: #333; /* Sets the color of the line */
  }
     </style>
  </head>
  <body>
    <div>
        <div id="header">
            <div class="left">
              <img
                src="https://cdn.pixabay.com/photo/2014/04/03/00/38/house-308936_1280.png"
                onclick="goHome()"
              />
              <h2>Amazook</h2>
            </div>
          
            <div class="right">
              <span>Game: <span id="phase">Cashier</span></span>
            </div>
          </div>
      <!-- <div id="sceneBox"> -->
      <div>
        <img id="imgBox" src="images/countMoney.png" />
      </div>

      <div id="receipt">
        <div class="notification" style="opacity: 1">
          <h3>Customer Items</h3>
          <hr class="thick-line" />
          <ul id="receipt-list">
            <!-- ${itemListHTML} -->
          </ul>
          <hr class="thick-line" />
          <p><strong>Total:</strong> <span id="customerTotal"></span></p>
          <p>
            <strong>Customer pays:</strong>
            <span id="roundedCustomerTotal"></span>
          </p>

          <label>
            
            Enter change:
            <input id="changeInput" type="number" step="0.01" />
          </label>

          <button id="submitChange" onclick="checkChange(change)">
            Submit
          </button>

          <p id="changeFeedback"></p>

          <button id="nextCustomer" onclick="NewCustomer()">
            Next Customer
          </button>
        </div>
      </div>
    </div>
    <!-- <script src="countMoney.js">
        function goHome() {
        window.location.href = "index.html"; // Go home (reload current page)
      }
    </script> -->
    <script>
        function goHome() {
        window.location.href = "index.html"; // Go home (reload current page)
      }
    </script>
  </body>
</html>
